name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t prodwebapp-test -f Dockerfile.dev .
      - name: Run tests
        run: docker run -e CI=true prodwebapp-test npm test

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build production Docker image
        run: docker build -t web-prod-app:latest .
      - name: Deploy to Dokku
        run: dokku git:from-image web-prod-app web-prod-app:latest
